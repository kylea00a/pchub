name: Deploy to Droplet

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-agent:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Windows agent executable
        run: npm run build:win -w agent

      - uses: actions/upload-artifact@v4
        with:
          name: pchub-agent-win
          path: agent/dist/PCHUB-Agent.exe
          retention-days: 14

  deploy:
    needs: build-agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: pchub-agent-win
          path: agent/dist

      - name: Deploy code on droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          port: 22
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /var/www/pchub
            git fetch origin main
            git reset --hard origin/main
            mkdir -p agent/dist

      - name: Upload agent executable to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          port: 22
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "agent/dist/PCHUB-Agent.exe"
          target: "/var/www/pchub/agent/dist"
          overwrite: true

      - name: Restart services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          port: 22
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /var/www/pchub
            bash deploy/pull-and-restart.sh
