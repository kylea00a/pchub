name: Build Windows MSIs (Host + Renter)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "stream/windows/**"
      - "agent/windows-prod/**"
      - ".github/workflows/build-windows-msi.yml"

concurrency:
  group: windows-msi
  cancel-in-progress: false

jobs:
  build-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg (host screen capture)
        shell: pwsh
        run: choco install ffmpeg -y

      - name: Publish StreamHost + Renter
        shell: pwsh
        run: |
          function Publish-Project($proj, $out) {
            dotnet publish $proj -c Release -r win-x64 --self-contained false -o $out 2>&1 | Tee-Object -Variable log
            if ($LASTEXITCODE -ne 0) {
              $log | Select-String 'error ' | ForEach-Object { Write-Host "::error::$_" }
              exit $LASTEXITCODE
            }
          }
          Publish-Project stream/windows/host/PCHUB.StreamHost/PCHUB.StreamHost.csproj staging/streamhost
          Publish-Project stream/windows/renter/PCHUB.Renter/PCHUB.Renter.csproj staging/renter
          Get-ChildItem staging/streamhost, staging/renter | Format-Table Name, Length

      - name: Stage host MSI payload
        shell: pwsh
        run: |
          pwsh -File stream/windows/installer/stage-host.ps1

      - name: Install WiX Toolset v4
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.*
          wix --version

      - name: Build MSIs
        shell: pwsh
        run: |
          dotnet build stream/windows/installer/host/PCHUB.Host.Installer.wixproj `
            -c Release `
            -p:HostStageDir="$PWD/staging/host-msi"
          dotnet build stream/windows/installer/renter/PCHUB.Renter.Installer.wixproj `
            -c Release `
            -p:RenterPublishDir="$PWD/staging/renter"
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Copy-Item stream/windows/installer/host/bin/Release/*.msi staging/ -Force
          Copy-Item stream/windows/installer/renter/bin/Release/*.msi staging/ -Force
          Get-ChildItem staging -Filter *.msi | Format-Table Name, Length

      - name: Write artifact README
        shell: pwsh
        run: |
          Set-Content -Path staging/README.txt -Value @"
          PCHUB Windows installers (v0.6)
          - PCHUB-Host.msi   -> C:\PCHUB-Host\ (agent + StreamHost, idempotent reinstall)
          - PCHUB-Renter.msi -> C:\Program Files\PCHUB\Renter\
          Download: https://pchub.cloud/downloads/PCHUB-Host.msi
                  https://pchub.cloud/downloads/PCHUB-Renter.msi
          Host needs FFmpeg on PATH for screen capture (winget install Gyan.FFmpeg).
          Edit C:\PCHUB-Host\config.json pairingCode after install, then run Start PCHUB Agent.
          "@

      - uses: actions/upload-artifact@v4
        with:
          name: PCHUB-windows-msi
          path: |
            staging/*.msi
            staging/README.txt
          retention-days: 14

  publish-msi:
    needs: build-msi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: PCHUB-windows-msi
          path: staging

      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "staging/*.msi,staging/README.txt"
          target: "/var/www/pchub/deploy/downloads"
          strip_components: 1
