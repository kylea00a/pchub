name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: windows-installer
  cancel-in-progress: false

jobs:
  publish-setup-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage setup files
        run: |
          mkdir -p staging
          cp agent/windows-installer/setup-wizard.ps1 staging/PCHUB-Host-Setup.ps1
          cp deploy/downloads/PCHUB-Host-Setup.cmd staging/PCHUB-Host-Setup.cmd
          cp agent/windows-prod/status-app.ps1 agent/windows-installer/status-app.ps1

      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "staging/PCHUB-Host-Setup.ps1,staging/PCHUB-Host-Setup.cmd"
          target: "/var/www/pchub/deploy/downloads"
          strip_components: 1

  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build PCHUB-Host-Setup.exe and PCHUB-Status.exe
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module ps2exe -Force -Scope CurrentUser -AllowClobber
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Invoke-ps2exe `
            -inputFile "agent\windows-installer\setup-wizard.ps1" `
            -outputFile "staging\PCHUB-Host-Setup.exe" `
            -title "PCHUB Host Setup" `
            -sta `
            -requireAdmin
          Invoke-ps2exe `
            -inputFile "agent\windows-prod\status-app.ps1" `
            -outputFile "staging\PCHUB-Status.exe" `
            -title "PCHUB Host" `
            -sta `
            -noConsole
          Get-Item staging\*.exe | Format-List Name, Length, LastWriteTime

      - uses: actions/upload-artifact@v4
        with:
          name: PCHUB-windows-exe
          path: staging/*.exe
          retention-days: 14

  build-host-bundle:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish PCHUB-StreamHost for host zip
        shell: pwsh
        run: |
          dotnet publish stream/windows/host/PCHUB.StreamHost/PCHUB.StreamHost.csproj `
            -c Release -r win-x64 --self-contained false `
            -o deploy/downloads/streamhost 2>&1 | Tee-Object -Variable log
          if ($LASTEXITCODE -ne 0) {
            $log | Select-String 'error ' | ForEach-Object { Write-Host "::error::$_" }
            exit $LASTEXITCODE
          }
          Get-ChildItem deploy/downloads/streamhost -Filter PCHUB-StreamHost.exe | Format-Table Name, Length

      - name: Publish PCHUB Renter zip
        shell: pwsh
        run: |
          $attempt = 0
          $maxAttempts = 2
          while ($attempt -lt $maxAttempts) {
            $attempt++
            Write-Host "Renter publish attempt $attempt/$maxAttempts"
            dotnet publish stream/windows/renter/PCHUB.Renter/PCHUB.Renter.csproj `
              -c Release -r win-x64 --self-contained false `
              -o deploy/downloads/renter 2>&1 | Tee-Object -Variable log
            if ($LASTEXITCODE -eq 0) { break }
            $log | Select-String 'error ' | ForEach-Object { Write-Host "::warning::$_" }
            if ($attempt -ge $maxAttempts) {
              $log | Select-String 'error ' | ForEach-Object { Write-Host "::error::$_" }
              exit $LASTEXITCODE
            }
            Start-Sleep -Seconds 15
          }
          $renterExe = Join-Path deploy/downloads/renter "PCHUB-Renter.exe"
          if (-not (Test-Path $renterExe)) {
            Get-ChildItem deploy/downloads/renter -Recurse | Select-Object FullName
            throw "PCHUB-Renter.exe missing after publish"
          }
          if (Test-Path deploy/downloads/PCHUB-Renter.zip) { Remove-Item deploy/downloads/PCHUB-Renter.zip -Force }
          Compress-Archive -Path (Join-Path deploy/downloads/renter '*') -DestinationPath deploy/downloads/PCHUB-Renter.zip
          Get-Item deploy/downloads/PCHUB-Renter.zip | Format-List Name, Length

      - name: Stage FFmpeg for host bundle
        shell: pwsh
        run: |
          $zip = "$env:RUNNER_TEMP/ffmpeg-essentials.zip"
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Write-Host "Downloading FFmpeg essentials..."
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          $extract = "$env:RUNNER_TEMP/ffmpeg-extract"
          if (Test-Path $extract) { Remove-Item $extract -Recurse -Force }
          Expand-Archive -Path $zip -DestinationPath $extract -Force
          $root = Get-ChildItem $extract -Directory | Select-Object -First 1
          if (-not $root) { throw "FFmpeg extract failed" }
          $out = "deploy/downloads/ffmpeg/bin"
          if (Test-Path "deploy/downloads/ffmpeg") { Remove-Item "deploy/downloads/ffmpeg" -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Copy-Item "$($root.FullName)\bin\*" $out -Recurse -Force
          Get-ChildItem $out -File | Measure-Object -Property Length -Sum | ForEach-Object {
            Write-Host "FFmpeg staged: $($_.Count) files, $([math]::Round($_.Sum / 1MB, 1)) MB"
          }

      - name: Stage publish folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path publish/streamhost, publish/ffmpeg | Out-Null
          if (Test-Path deploy/downloads/streamhost) {
            Copy-Item deploy/downloads/streamhost/* publish/streamhost/ -Recurse -Force
          }
          if (Test-Path deploy/downloads/ffmpeg) {
            Copy-Item deploy/downloads/ffmpeg/* publish/ffmpeg/ -Recurse -Force
          }
          if (Test-Path deploy/downloads/PCHUB-Renter.zip) {
            Copy-Item deploy/downloads/PCHUB-Renter.zip publish/ -Force
          } else {
            throw "PCHUB-Renter.zip missing — renter publish step failed"
          }
          if (Test-Path deploy/downloads/streamhost/PCHUB-StreamHost.exe) {
            if (Test-Path deploy/downloads/PCHUB-StreamHost.zip) {
              Remove-Item deploy/downloads/PCHUB-StreamHost.zip -Force
            }
            Compress-Archive -Path "deploy/downloads/streamhost/*" -DestinationPath publish/PCHUB-StreamHost.zip
          }
          Get-ChildItem publish -Recurse -File | Select-Object -First 30 FullName, Length
          if (-not (Test-Path publish/PCHUB-Renter.zip)) { throw "publish/PCHUB-Renter.zip missing before artifact upload" }

      - uses: actions/upload-artifact@v4
        with:
          name: PCHUB-host-bundle
          path: publish/**
          retention-days: 14
  publish-exe:
    needs: build-exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: PCHUB-windows-exe
          path: staging

      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "staging/PCHUB-Host-Setup.exe,staging/PCHUB-Status.exe"
          target: "/var/www/pchub/deploy/downloads"
          strip_components: 1

  publish-host-bundle:
    needs: build-host-bundle
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: PCHUB-host-bundle
          path: bundle

      - name: Pack bundle for upload
        run: |
          find bundle -type f | head -50
          tar -czf pchub-host-bundle.tgz -C bundle .
          ls -la pchub-host-bundle.tgz

      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "pchub-host-bundle.tgz"
          target: "/tmp"
          overwrite: true

      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            mkdir -p /var/www/pchub/deploy/downloads
            cd /var/www/pchub/deploy/downloads
            tar -xzf /tmp/pchub-host-bundle.tgz
            rm -f /tmp/pchub-host-bundle.tgz
            ls -la streamhost | head -8
            ls -la PCHUB-StreamHost.zip PCHUB-Renter.zip
            test -f PCHUB-Renter.zip || (echo "ERROR: PCHUB-Renter.zip missing after extract" && exit 1)
