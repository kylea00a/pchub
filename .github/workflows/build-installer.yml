name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: windows-installer
  cancel-in-progress: false

jobs:
  publish-setup-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage setup files
        run: |
          mkdir -p staging
          cp agent/windows-installer/setup-wizard.ps1 staging/PCHUB-Host-Setup.ps1
          cp deploy/downloads/PCHUB-Host-Setup.cmd staging/PCHUB-Host-Setup.cmd

      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "staging/PCHUB-Host-Setup.ps1,staging/PCHUB-Host-Setup.cmd"
          target: "/var/www/pchub/deploy/downloads"
          strip_components: 1

  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build PCHUB-Host-Setup.exe and PCHUB-Status.exe
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module ps2exe -Force -Scope CurrentUser -AllowClobber
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Invoke-ps2exe `
            -inputFile "agent\windows-installer\setup-wizard.ps1" `
            -outputFile "staging\PCHUB-Host-Setup.exe" `
            -title "PCHUB Host Setup" `
            -sta `
            -requireAdmin
          Invoke-ps2exe `
            -inputFile "agent\windows-installer\status-app.ps1" `
            -outputFile "staging\PCHUB-Status.exe" `
            -title "PCHUB Host" `
            -sta `
            -noConsole
          Get-Item staging\*.exe | Format-List Name, Length, LastWriteTime

      - uses: actions/upload-artifact@v4
        with:
          name: PCHUB-windows-apps
          path: staging/*.exe
          retention-days: 14

  publish-exe:
    needs: build-exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: PCHUB-windows-apps
          path: staging

      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "staging/PCHUB-Host-Setup.exe,staging/PCHUB-Status.exe"
          target: "/var/www/pchub/deploy/downloads"
          strip_components: 1
