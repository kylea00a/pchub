name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: windows-installer
  cancel-in-progress: false

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup
        uses: minimaxalphax/setup-inno-setup@v1.2.0

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC not found at $iscc" }
          & $iscc "agent\windows-installer\PCHUB-Host.iss"
          $exe = Get-Item "agent\windows-installer\output\PCHUB-Host-Setup.exe"
          Write-Host "Built $($exe.FullName) ($($exe.Length) bytes)"

      - name: Upload installer to droplet
        shell: pwsh
        env:
          SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
        run: |
          $keyPath = "$env:RUNNER_TEMP\pchub_deploy_key"
          Set-Content -Path $keyPath -Value $env:SSH_KEY -NoNewline
          icacls $keyPath /inheritance:r | Out-Null
          icacls $keyPath /grant:r "$($env:USERNAME):(R)" | Out-Null
          scp -i $keyPath -o StrictHostKeyChecking=no `
            "agent\windows-installer\output\PCHUB-Host-Setup.exe" `
            "root@${env:DROPLET_HOST}:/var/www/pchub/deploy/downloads/PCHUB-Host-Setup.exe"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCHUB-Host-Setup
          path: agent/windows-installer/output/PCHUB-Host-Setup.exe
          retention-days: 14
