name: Build Windows Installer

on:
  push:
    branches: [main]
    paths:
      - "agent/windows-installer/**"
      - ".github/workflows/build-installer.yml"
  workflow_dispatch:

concurrency:
  group: windows-installer
  cancel-in-progress: false

jobs:
  publish-setup-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage setup files
        run: |
          mkdir -p staging
          cp agent/windows-installer/bootstrap.ps1 staging/PCHUB-Host-Setup.ps1
          cp deploy/downloads/PCHUB-Host-Setup.cmd staging/PCHUB-Host-Setup.cmd

      - name: Upload to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "staging/PCHUB-Host-Setup.ps1,staging/PCHUB-Host-Setup.cmd"
          target: "/var/www/pchub/deploy/downloads"
          strip_components: 1

  build-exe:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Build PCHUB-Host-Setup.exe (optional)
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module ps2exe -Force -Scope CurrentUser -AllowClobber
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Invoke-ps2exe `
            -inputFile "agent\windows-installer\bootstrap.ps1" `
            -outputFile "staging\PCHUB-Host-Setup.exe" `
            -title "PCHUB Host Setup" `
            -requireAdmin
          Get-Item "staging\PCHUB-Host-Setup.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: PCHUB-Host-Setup-exe
          path: staging/PCHUB-Host-Setup.exe
          retention-days: 14

  publish-exe:
    needs: build-exe
    if: needs.build-exe.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: PCHUB-Host-Setup-exe
          path: staging

      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "staging/PCHUB-Host-Setup.exe"
          target: "/var/www/pchub/deploy/downloads"
          strip_components: 1
