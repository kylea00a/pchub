name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: windows-installer
  cancel-in-progress: false

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $installer = "$env:RUNNER_TEMP\innosetup-installer.exe"
          Invoke-WebRequest -Uri "https://files.jrsoftware.org/is/6/innosetup-6.3.3.exe" -OutFile $installer
          $proc = Start-Process -FilePath $installer -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART","/SP-" -PassThru -Wait
          if ($proc.ExitCode -ne 0) { throw "Inno Setup install failed with exit $($proc.ExitCode)" }
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC not found at $iscc" }
          Write-Host "Inno Setup ready: $iscc"

      - name: Compile installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "agent\windows-installer\PCHUB-Host.iss"
          $exe = Get-Item "agent\windows-installer\output\PCHUB-Host-Setup.exe"
          Write-Host "Built $($exe.FullName) ($($exe.Length) bytes)"

      - name: Upload installer to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "agent/windows-installer/output/PCHUB-Host-Setup.exe"
          target: "/var/www/pchub/deploy/downloads"
          strip_components: 3

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCHUB-Host-Setup
          path: agent/windows-installer/output/PCHUB-Host-Setup.exe
          retention-days: 14
