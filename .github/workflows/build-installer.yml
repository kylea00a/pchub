name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: windows-installer
  cancel-in-progress: false

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build PCHUB-Host-Setup.exe
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module ps2exe -Force -Scope CurrentUser -AllowClobber
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Invoke-ps2exe `
            -inputFile "agent\windows-installer\bootstrap.ps1" `
            -outputFile "staging\PCHUB-Host-Setup.exe" `
            -title "PCHUB Host Setup" `
            -description "PCHUB host agent installer" `
            -company "PCHUB" `
            -product "PCHUB Host" `
            -copyright "PCHUB" `
            -requireAdmin
          Get-Item "staging\PCHUB-Host-Setup.exe" | Format-List Name, Length

      - uses: actions/upload-artifact@v4
        with:
          name: PCHUB-Host-Setup
          path: staging/PCHUB-Host-Setup.exe
          retention-days: 14

  publish-installer:
    needs: build-installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: PCHUB-Host-Setup
          path: staging

      - name: Upload installer to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "staging/PCHUB-Host-Setup.exe"
          target: "/var/www/pchub/deploy/downloads"
          strip_components: 1
